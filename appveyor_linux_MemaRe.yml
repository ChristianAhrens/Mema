version: 1.0.{build}

branches:
  only:
    - main
    - develop

image: Ubuntu

services:
  - docker

shallow_clone: true

init:
  - sh: |
      echo ">>> Pulling Ubuntu 24.04 Docker image..."
      docker pull ubuntu:24.04

      echo ">>> Starting Docker build environment..."
      docker run --rm \
        -v "$APPVEYOR_BUILD_FOLDER:/src" \
        -w /src \
        ubuntu:24.04 \
        /bin/bash -c "
          set -e

          echo '>>> Updating apt...'
          apt-get update -y

          echo '>>> Installing JUCE / compiler dependencies...'
          apt-get install -y \
            git g++-11 gcc-11 make \
            libcurl4-openssl-dev \
            libfreetype6-dev libfontconfig1-dev \
            libasound2-dev libjack-jackd2-dev \
            ladspa-sdk \
            libx11-dev libxcomposite-dev libxcursor-dev libxext-dev \
            libxinerama-dev libxrandr-dev libxrender-dev libwebkit2gtk-4.1-dev \
            libglu1-mesa-dev mesa-common-dev

          echo '>>> Setting gcc/g++ to gcc-11...'
          update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-11 100 \
            --slave /usr/bin/g++ g++ /usr/bin/g++-11 \
            --slave /usr/bin/gcov gcov /usr/bin/gcov-11

          echo '>>> Updating git submodules...'
          git submodule update --init --recursive

          echo '>>> Running build_MemaRe.sh...'
          cd Resources/Deployment/Linux
          chmod +x build_MemaRe.sh
          ./build_MemaRe.sh

          echo '>>> Build completed successfully inside Docker.'
        "

install:
  - echo "Install step executed inside Docker."

build_script:
  - echo "Build executed inside Docker during init phase."

notifications:
  - provider: Email
    to:
      - christianahrens@me.com
    on_build_success: false
    on_build_failure: true
    on_build_status_changed: false
